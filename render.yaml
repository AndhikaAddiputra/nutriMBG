services:
  - type: web
    name: nutrimbg-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    branch: deployment
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutrimbg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENVIRONMENT
        value: production
      - key: RATE_LIMIT_BACKEND
        value: db
      - key: CORS_ORIGINS
        value: '["https://nutrimbg.onrender.com","http://localhost:5173"]'

  - type: static_site
    name: nutrimbg
    runtime: node
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    branch: deployment
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: nutrimbg-api
          property: host

databases:
  - name: nutrimbg-db
    databaseType: postgresql
    plan: free
    ipAllowList: []
