version: "3.9"

x-common-env: &common-env
  ENVIRONMENT: production
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXP_HOURS: ${JWT_EXP_HOURS:-8}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
  GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrimbg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrimbg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nutrimbg}
      POSTGRES_DB: nutrimbg
    ports:
      - "5433:5432"
    volumes:
      - nutrimbg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrimbg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nutrimbg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nutrimbg_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nutrimbg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://nutrimbg:${DB_PASSWORD:-nutrimbg}@postgres:5432/nutrimbg
      REDIS_URL: redis://redis:6379/0
    volumes:
      - nutrimbg_artifacts:/app/artifacts
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: nutrimbg-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"

  nginx:
    image: nginx:1.27-alpine
    container_name: nutrimbg-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nutrimbg_ssl:/etc/nginx/ssl

volumes:
  nutrimbg_pgdata:
  nutrimbg_redisdata:
  nutrimbg_artifacts:
  nutrimbg_ssl:
